name: Update cache-busting version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cache_bust:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in index.html
        run: |
          ts=$(date -u +%Y%m%d%H%M%S)
          sed -i -E "s/styles\.css\?v=[0-9-]+/styles.css?v=${ts}/g" index.html
          sed -i -E "s/script\.js\?v=[0-9-]+/script.js?v=${ts}/g" index.html

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update cache-busting version"
          git push
